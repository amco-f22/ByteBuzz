services:
  db:
    image: postgres:16-alpine
    container_name: bytebuzz-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bytebuzz_user
      POSTGRES_PASSWORD: bytebuzz_pass_2026
      POSTGRES_DB: bytebuzz_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bytebuzz_user -d bytebuzz_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Security: read-only root filesystem where possible
    tmpfs:
      - /tmp
      - /run

    
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bytebuzz-backend
    restart: unless-stopped
    environment:
      PORT: "5000"
      DB_USER: bytebuzz_user
      DB_PASSWORD: bytebuzz_pass_2026
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: bytebuzz_db
    expose:
      - "5000"

    depends_on:
      db:
        condition: service_healthy
    # Security: do not run as root (already in Dockerfile, but enforced here too)
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bytebuzz-frontend
    restart: unless-stopped
    ports:
      - "8:8080"
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local